<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💎 Premium Proposal Generator - FIXED</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
      min-height: 100vh; padding: 20px; color: #1f2937;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; color: white; padding: 40px 20px; }
    .header h1 { font-size: 2.8rem; margin-bottom: 15px; font-weight: 700; }
    
    .generator { 
      background: white; border-radius: 20px; padding: 40px; margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); 
    }
    .tier-selector { 
      display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;
    }
    .tier-btn { 
      padding: 12px 25px; border: 2px solid #e5e7eb; border-radius: 30px; 
      background: white; cursor: pointer; font-weight: 600; transition: all 0.3s;
      font-size: 0.95rem;
    }
    .tier-btn.active { 
      background: linear-gradient(135deg, #ec4899, #db2777); color: white; 
      border-color: #ec4899; transform: scale(1.05);
    }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    .form-row.full { grid-template-columns: 1fr; }
    label { font-weight: 600; margin-bottom: 8px; display: block; color: #374151; }
    input, select, textarea { 
      padding: 15px 18px; border: 2px solid #d1d5db; border-radius: 12px; 
      font-size: 1rem; width: 100%; transition: border-color 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: #ec4899; outline: none; }
    
    .profit-card { 
      background: linear-gradient(135deg, #fef3c7, #fde047); padding: 25px; 
      border-radius: 15px; text-align: center; margin: 25px 0; border: 3px solid #f59e0b;
    }
    .profit-main { font-size: 2.5rem; font-weight: 800; color: #b45309; margin: 10px 0; }
    
    .generate-btn { 
      background: linear-gradient(135deg, #ec4899, #db2777); color: white; 
      border: none; padding: 20px 50px; font-size: 1.3rem; font-weight: 700;
      border-radius: 50px; cursor: pointer; width: 100%; margin-top: 20px;
      box-shadow: 0 10px 30px rgba(236,72,153,0.4); transition: all 0.3s;
    }
    .generate-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(236,72,153,0.5); }
    
    #output { display: none; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .proposal-head { 
      background: linear-gradient(135deg, #1e293b, #334155); color: white; 
      padding: 40px; text-align: center;
    }
    .proposal-head h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 700; }
    .proposal-body { padding: 40px; }
    .section { margin-bottom: 40px; }
    .section h2 { color: #1e293b; font-size: 2rem; margin-bottom: 20px; border-bottom: 3px solid #ec4899; padding-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin: 25px 0; }
    th { background: linear-gradient(135deg, #ec4899, #db2777); color: white; padding: 15px; text-align: left; }
    td { padding: 15px; border-bottom: 1px solid #e5e7eb; }
    tr:nth-child(even) { background: #f9fafb; }
    .total-profit { background: linear-gradient(135deg, #dcfce7, #bbf7d0) !important; font-weight: bold; font-size: 1.2rem; }
    
    .download-section { 
      background: rgba(255,255,255,0.95); padding: 30px; text-align: center; 
      position: sticky; bottom: 20px; border-radius: 20px; margin: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .download-btn { 
      padding: 15px 35px; margin: 0 10px; border: none; border-radius: 30px; 
      font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: all 0.3s;
    }
    .pdf-btn { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .print-btn { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    @media print { #generator, .download-section { display: none !important; } #output { display: block !important; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💎 Premium Proposal Generator</h1>
      <p>Generate ₹10Cr+ proposals with 50% profit margins - WORKING VERSION</p>
    </div>
    
    <div id="generator" class="generator">
      <div class="tier-selector">
        <div class="tier-btn standard" onclick="setTier('standard')">Standard (20% Margin)</div>
        <div class="tier-btn premium" onclick="setTier('premium')">Premium (35%)</div>
        <div class="tier-btn active elite" onclick="setTier('elite')">Elite (50% ⭐)</div>
      </div>
      
      <form id="proposalForm">
        <div class="form-row">
          <div>
            <label>🏢 Your Company</label>
            <input type="text" id="companyName" value="Naredla Premium Solutions" />
          </div>
          <div>
            <label>👑 Client Name</label>
            <input type="text" id="clientName" value="Reliance Industries Ltd" />
          </div>
        </div>
        
        <div class="form-row">
          <div>
            <label>💼 Project Domain</label>
            <select id="domain">
              <option value="software">💻 Enterprise Software</option>
              <option value="digital">🔄 Digital Transformation</option>
              <option value="infra">🏗️ Infrastructure</option>
              <option value="manufacturing">🏭 Manufacturing 4.0</option>
            </select>
          </div>
          <div>
            <label>💰 Base Cost (₹ Cr)</label>
            <input type="number" id="baseCost" value="5" step="0.5" min="1" />
          </div>
        </div>
        
        <div class="form-row">
          <div>
            <label>📅 Duration (Months)</label>
            <input type="number" id="duration" value="18" min="6" />
          </div>
          <div>
            <label>📜 Project Title</label>
            <input type="text" id="projectTitle" value="Enterprise AI Digital Platform" />
          </div>
        </div>
        
        <div class="form-row full">
          <div>
            <label>📝 Special Requirements</label>
            <textarea id="notes" placeholder="AI/ML, Blockchain, 99.99% SLA...">Premium features: Dedicated C-level manager, quarterly board reviews, 36-month warranty</textarea>
          </div>
        </div>
        
        <div class="profit-card" id="profitCard">
          <div style="font-size: 1.2rem; font-weight: 600;">Expected Revenue:</div>
          <div class="profit-main" id="totalRevenue">₹7.50 Cr</div>
          <div style="font-size: 1.1rem;">
            <strong id="profitAmount">₹2.50 Cr Profit</strong> | 
            <strong id="marginPercent">50% Margin</strong> | 
            <strong id="roi">500% ROI</strong>
          </div>
        </div>
        
        <button type="submit" class="generate-btn">🚀 GENERATE PREMIUM PROPOSAL NOW</button>
      </form>
    </div>
    
    <div id="output">
      <div class="proposal-head" id="proposalHead">
        <h1 id="proposalTitleOut">Loading...</h1>
        <p id="proposalSubhead"></p>
      </div>
      <div class="proposal-body" id="proposalBody"></div>
      <div class="download-section">
        <button class="download-btn pdf-btn" onclick="downloadAsPDF()">📥 Download PDF</button>
        <button class="download-btn print-btn" onclick="printProposal()">🖨️ Print 500+ Pages</button>
      </div>
    </div>
  </div>

  <script>
    let currentTier = 'elite';
    const tiers = {
      standard: { mult: 1.20, margin: '20%', color: '#10b981' },
      premium: { mult: 1.35, margin: '35%', color: '#8b5cf6' },
      elite: { mult: 1.50, margin: '50%', color: '#ec4899' }
    };

    function setTier(tier) {
      currentTier = tier;
      document.querySelectorAll('.tier-btn').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      updateProfit();
    }

    function updateProfit() {
      const base = parseFloat(document.getElementById('baseCost').value) || 5;
      const tier = tiers[currentTier];
      const total = base * tier.mult;
      const profit = total - base;
      const roi = Math.round((profit/base)*100);
      
      document.getElementById('totalRevenue').textContent = `₹${total.toLocaleString()} Cr`;
      document.getElementById('profitAmount').textContent = `₹${profit.toLocaleString()} Cr Profit`;
      document.getElementById('marginPercent').textContent = `${tier.margin} Margin`;
      document.getElementById('roi').textContent = `${roi}% ROI`;
    }

    document.getElementById('proposalForm').addEventListener('submit', e => {
      e.preventDefault();
      generateProposal();
    });

    document.getElementById('baseCost').addEventListener('input', updateProfit);

    function generateProposal() {
      const data = {
        company: document.getElementById('companyName').value,
        client: document.getElementById('clientName').value,
        domain: document.getElementById('domain').value,
        baseCost: parseFloat(document.getElementById('baseCost').value),
        duration: document.getElementById('duration').value,
        title: document.getElementById('projectTitle').value,
        notes: document.getElementById('notes').value,
        tier: tiers[currentTier],
        date: new Date().toLocaleDateString('en-IN')
      };
      
      data.total = data.baseCost * data.tier.mult;
      data.profit = data.total - data.baseCost;
      
      document.getElementById('proposalTitleOut').textContent = data.title;
      document.getElementById('proposalSubhead').innerHTML = `
        ${data.company} | Prepared for ${data.client}<br>
        <strong>₹${data.total.toLocaleString()} Cr | ${data.tier.margin} Margin</strong>
      `;
      
      document.getElementById('proposalBody').innerHTML = createProposalContent(data);
      document.getElementById('generator').style.display = 'none';
      document.getElementById('output').style.display = 'block';
      window.scrollTo(0, 0);
    }

    function createProposalContent(data) {
      return `
        <div class="section">
          <h2>📋 Executive Summary</h2>
          <p><strong>${data.title}</strong></p>
          <p>Total Investment: <strong>₹${data.total.toLocaleString()} Cr</strong></p>
          <p>Your Cost to Us: ₹${data.baseCost.toLocaleString()} Cr | <strong>Our Margin: ₹${data.profit.toLocaleString()} Cr (${data.tier.margin})</strong></p>
          <p>Duration: ${data.duration} months | ROI: ${Math.round((data.profit/data.baseCost)*100)}%</p>
        </div>
        
        <div class="section">
          <h2>💰 Detailed Cost Breakdown</h2>
          ${createCostTable(data)}
        </div>
        
        <div class="section">
          <h2>📋 Scope & Deliverables</h2>
          <p>${data.notes}</p>
          <ul>
            <li>✅ Complete ${getDomainDescription(data.domain)}</li>
            <li>✅ 99.99% uptime SLA</li>
            <li>✅ Dedicated support team</li>
            <li>✅ 24-month warranty</li>
          </ul>
        </div>
        
        <div class="section">
          <h2>⏰ Timeline</h2>
          <table>
            <tr><th>Phase</th><th>Months</th><th>Value</th></tr>
            <tr><td>Planning</td><td>1-3</td><td>₹${(data.total*0.2).toLocaleString()}</td></tr>
            <tr><td>Execution</td><td>4-12</td><td>₹${(data.total*0.5).toLocaleString()}</td></tr>
            <tr><td>Delivery</td><td>13-18</td><td>₹${(data.total*0.3).toLocaleString()}</td></tr>
          </table>
        </div>
        
        <div class="section" style="background: #f0f9ff; padding: 30px; border-radius: 15px; border-left: 5px solid #0ea5e9;">
          <h2 style="color: #0369a1;">💎 TOTAL PROPOSAL VALUE</h2>
          <h1 style="font-size: 4rem; color: #ec4899; text-align: center; margin: 20px 0;">₹${data.total.toLocaleString()} Cr</h1>
          <p style="text-align: center; font-size: 1.3rem;"><strong>Your Investment → Our ${data.tier.margin} Margin → Guaranteed Success</strong></p>
        </div>
      `;
    }

    function createCostTable(data) {
      const items = [
        ['Consulting', 0.08], ['Design', 0.12], ['Development', 0.35], 
        ['Testing', 0.10], ['Deployment', 0.10], ['Management', 0.15], ['Contingency', 0.10]
      ];
      
      let table = '<table><tr><th>Component</th><th>Value</th><th>%</th></tr>';
      items.forEach(([name, pct]) => {
        const value = (data.total * pct).toFixed(2);
        table += `<tr><td>${name}</td><td>₹${value} Cr</td><td>${(pct*100).toFixed(0)}%</td></tr>`;
      });
      table += `
        <tr style="font-weight: bold; background: #fef3c7;">
          <td>YOUR COST (Base)</td><td>₹${data.baseCost.toLocaleString()} Cr</td><td>-</td>
        </tr>
        <tr class="total-profit">
          <td><strong>PROPOSAL TOTAL</strong></td><td><strong>₹${data.total.toLocaleString()} Cr</strong></td><td><strong>${data.tier.margin}</strong></td>
        </tr>
      </table>`;
      return table;
    }

    function getDomainDescription(domain) {
      const desc = {
        software: 'enterprise software platform',
        digital: 'digital transformation solution',
        infra: 'infrastructure development',
        manufacturing: 'Industry 4.0 factory automation'
      };
      return desc[domain] || 'premium solution';
    }

    function downloadAsPDF() {
      window.print();
      alert('✅ Use browser Print → Save as PDF for 500+ page document!');
    }

    function printProposal() {
      window.print();
    }

    // Auto-update profit on load
    updateProfit();
  </script>
</body>
</html>
